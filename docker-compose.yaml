version: "3.9"

services:
  api:
    build: .
    container_name: maya-api

    ports:
      - "3000:3000"

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/maya_croche
      JWT_SECRET: supersecret
      JWT_EXPIRES_IN: 1d
      PORT: 3000
      ADMIN_SEED_NAME: Admin
      ADMIN_SEED_EMAIL: admin@mayacroche.com.br
      ADMIN_SEED_PASSWORD: troque-esta-senha
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

    restart: unless-stopped

  postgres:
    image: postgres:17

    container_name: maya-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maya_croche

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: