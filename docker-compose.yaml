version: "3.9"

services:
  api:
    build: .
    container_name: maya-api

    ports:
      - "3000:3000"

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/maya_croche
      JWT_SECRET: supersecret
      PORT: 3000

    restart: unless-stopped

  postgres:
    image: postgres:17

    container_name: maya-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maya_croche

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: